services:
  - type: worker
    name: repodiet-worker
    runtime: docker
    dockerfilePath: ./worker/Dockerfile
    envVars:
      - key: REPODIET_API_BASE_URL
        sync: false
      - key: WORKER_API_KEY
        sync: false
      - key: WORKER_CALLBACK_SECRET
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GITHUB_INSTALLATION_TOKEN
        sync: false
      - key: WORKER_POLL_MS
        value: "5000"
      - key: WORKER_HEARTBEAT_MS
        value: "10000"
